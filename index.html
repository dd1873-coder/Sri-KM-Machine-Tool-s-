<!DOCTYPE html><html lang="ta">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ACE / AMS Material List Web App</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" /><style>
*{box-sizing:border-box}
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#eef2f7;
    color:#111827;
}
.app{
    max-width:1100px;
    margin:20px auto;
    background:#fff;
    border-radius:14px;
    box-shadow:0 12px 35px rgba(0,0,0,.12);
    overflow:hidden;
}
.topbar{
    background:linear-gradient(135deg,#0f172a,#1e40af);
    color:#fff;
    padding:18px 22px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:15px;
    flex-wrap:wrap;
}
.topbar h1{margin:0;font-size:22px;letter-spacing:.4px}
.topbar p{margin:4px 0 0;font-size:13px;color:#cbd5e1}
.badge{
    background:#22c55e;
    color:#fff;
    padding:8px 12px;
    border-radius:30px;
    font-size:13px;
    font-weight:bold;
}
.form-area{padding:20px}
.customer-grid{
    display:grid;
    grid-template-columns:130px 1fr 130px 1fr;
    border:2px solid #111827;
    max-width:780px;
    margin-bottom:22px;
}
.customer-grid label,
.customer-grid input,
.customer-grid select{
    border:1px solid #111827;
    padding:9px;
    font-size:14px;
}
.customer-grid label{
    font-weight:bold;
    background:#f8fafc;
}
.customer-grid input,
.customer-grid select{
    border-radius:0;
    outline:none;
    background:#fff;
}
.photo-section{
    margin-bottom:20px;
    padding:15px;
    border:2px solid #111827;
    border-radius:8px;
    background:#f8fafc;
}
.photo-label{
    display:block;
    font-weight:bold;
    margin-bottom:10px;
}
#photoUpload{margin-bottom:12px}
.photo-preview-box{
    min-height:150px;
    border:2px dashed #94a3b8;
    border-radius:8px;
    display:flex;
    flex-direction:column;
    gap:20px;
    background:#fff;
    color:#64748b;
    font-size:13px;
    padding:20px;
}
.photo-preview-box span{
    text-align:center;
    padding:45px 0;
}
.photo-preview-box img{
    width:100%;
    height:auto;
    object-fit:contain;
    border-radius:12px;
    border:3px solid #cbd5e1;
    background:#f8fafc;
    padding:6px;
    display:block;
}
.table-wrap{
    overflow-x:auto;
    border:2px solid #111827;
    border-radius:8px;
}
table{
    width:100%;
    border-collapse:collapse;
    min-width:750px;
}
th,td{
    border:1px solid #111827;
    padding:8px;
    text-align:center;
    font-size:14px;
}
th{
    background:#f1f5f9;
    font-weight:bold;
}
.material-input,
select{
    width:100%;
    padding:8px;
    border:1px solid #94a3b8;
    border-radius:6px;
    font-size:14px;
    background:#fff;
}
.material-input:focus,
select:focus,
input:focus{
    outline:2px solid #2563eb;
    border-color:#2563eb;
}
.btn-row{
    display:flex;
    gap:10px;
    margin-top:16px;
    flex-wrap:wrap;
}
button{
    border:none;
    padding:11px 16px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    color:#fff;
}
.add-btn{background:#2563eb}
.download-btn{background:#16a34a}
.clear-btn{background:#dc2626}
.delete-btn{
    background:#ef4444;
    padding:7px 10px;
}
.note{
    margin-top:12px;
    font-size:13px;
    color:#475569;
}
.pdf-mode .btn-row,
.pdf-mode .note,
.pdf-mode .delete-col,
.pdf-mode #photoUpload{
    display:none !important;
}
.pdf-mode .app{
    box-shadow:none;
    margin:0;
    border-radius:0;
}
.pdf-mode select,
.pdf-mode input{
    border:none;
    outline:none;
    appearance:none;
    font-weight:500;
}
@media(max-width:700px){
    .app{margin:0;border-radius:0;min-height:100vh}
    .customer-grid{grid-template-columns:120px 1fr;max-width:100%}
    .topbar h1{font-size:18px}
    .photo-preview-box{width:100%}
}
</style></head><body>
<datalist id="materialSuggestions"></datalist><div class="app">
    <div class="topbar">
        <div class="badge">Sri KM Machine Tools</div>
    </div><div class="form-area">
    <div class="customer-grid">
        <label>CUSTOMER</label>
        <input type="text" id="customer" />

        <label>DATE</label>
        <input type="date" id="date" />

        <label>MC TYPE</label>
        <input type="text" id="mcType" />

        <label>MC NO</label>
        <input type="text" id="mcNo" />

        <label>LIST TYPE</label>
        <select id="listType" onchange="changeMaterialList(); saveData();">
            <option value="ACE">ACE</option>
            <option value="AMS">AMS</option>
        </select>
    </div>

    <div class="photo-section">
        <label class="photo-label">UPLOAD PHOTO</label>
        <input type="file" id="photoUpload" accept="image/*" multiple onchange="handlePhotoUpload(event)" />
        <div id="photoPreviewBox" class="photo-preview-box">
            <span>No photos selected</span>
        </div>
    </div>

    <div class="table-wrap">
        <table id="materialTable">
            <thead>
                <tr>
                    <th style="width:80px">SL NO</th>
                    <th>MATERIAL NAME / TYPE NEW</th>
                    <th style="width:180px">QTY</th>
                    <th class="delete-col" style="width:90px">DELETE</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="btn-row">
        <button class="add-btn" onclick="addRow()"><i class="fa fa-plus"></i> Add Row</button>
        <button class="download-btn" onclick="downloadPDF()"><i class="fa fa-download"></i> Download PDF</button>
        <button class="clear-btn" onclick="clearRows()"><i class="fa fa-trash"></i> Clear</button>
    </div>
</div>

</div><script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script><script>
const aceMaterialList = [
    "PM KIT STD",
    "PM KIT STD 1",
    "PM Kit for LM",
    "PM Kit for LM 1",
    "BOOT",
    "NEW TYPE POPPET",
    "OLD Type Puppet",
    "KNOB",
    "0.25 cc CATRIDGE",
    "RLF SMALL",
    "RLF Big",
    "FEETING TYPE 0-70 PRESSURE GAUGE",
    "0-10 MPA Gauge",
    "0-28 PRESSURE GAUGE",
    "Y STAINER",
    "TAC 25-62 BEARING",
    "ISO FULX GREES",
    "6 INCH READTER COOLING FAN",
    "270 L ENCODER BELT",
    "300 L ENCODER BELT",
    "450 L ENCODER BELT",
    "XPA1450 Spindle Belt",
    "XPA1650 Spindle Belt",
    "XPA1800 Spindle Belt",
    "XPA1850 Spindle Belt",
    "XPA1900 Spindle Belt",
    "XPA1950 Spindle Belt",
    "SPA1850 Spindle Belt",
    "SPA1900 Spindle Belt",
    "SPA1950 Spindle Belt",
    "P110 Chucking Cylinder Seal Kit",
    "P110 V-Seal"
];

const amsMaterialList = [
    "BT-30 Ball collat",
    "bt-30 split collat",
    "RLF Small",
    "RLF BIG",
    "Suction strainer"
];

let materialList = aceMaterialList;
const qtyList = Array.from({length:100},(_,i)=>i+1);
const tableBody = document.getElementById("tableBody");
const storageKey = "ace_ams_material_list_saved_data";
const photoKey = "ace_ams_material_uploaded_photos";

function updateMaterialSuggestions(){
    const suggestionBox = document.getElementById("materialSuggestions");
    suggestionBox.innerHTML = materialList.map(item => `<option value="${item}">`).join("");
}

function qtyOptions(){
    return '<option value="">Select Qty</option>' + qtyList.map(qty => `<option value="${qty}">${qty}</option>`).join("");
}

function changeMaterialList(){
    const selectedType = document.getElementById("listType").value;
    materialList = selectedType === "AMS" ? amsMaterialList : aceMaterialList;
    updateMaterialSuggestions();

    [...tableBody.rows].forEach(row => {
        const input = row.cells[1].querySelector("input");
        if(input && input.value && !materialList.includes(input.value)){
            input.value = "";
        }
    });
}

function addRow(selectedMaterial = "", selectedQty = ""){
    const rowCount = tableBody.rows.length + 1;
    const row = document.createElement("tr");
    row.innerHTML = `
        <td class="slno">${rowCount}</td>
        <td>
            <input list="materialSuggestions" class="material-input" placeholder="Select or Type Material" value="${selectedMaterial}" oninput="saveData()" onchange="saveData()">
        </td>
        <td><select onchange="saveData()">${qtyOptions()}</select></td>
        <td class="delete-col"><button class="delete-btn" onclick="deleteRow(this)"><i class="fa fa-xmark"></i></button></td>
    `;
    tableBody.appendChild(row);
    row.cells[2].querySelector("select").value = selectedQty;
    updateSlNo();
    saveData();
}

function deleteRow(btn){
    btn.closest("tr").remove();
    updateSlNo();
    saveData();
}

function updateSlNo(){
    [...tableBody.rows].forEach((row,index)=>{
        row.querySelector(".slno").textContent = index + 1;
    });
}

async function handlePhotoUpload(event){
    const files = Array.from(event.target.files);
    if(!files.length) return;

    const existingPhotos = JSON.parse(localStorage.getItem(photoKey) || "[]");

    for(const file of files){
        const base64 = await fileToBase64(file);
        existingPhotos.push(base64);
    }

    localStorage.setItem(photoKey, JSON.stringify(existingPhotos));
    showPhotos(existingPhotos);
    saveData();
}

function fileToBase64(file){
    return new Promise((resolve,reject)=>{
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
        reader.readAsDataURL(file);
    });
}

function showPhotos(photoArray){
    const box = document.getElementById("photoPreviewBox");
    box.innerHTML = "";

    if(!photoArray || !photoArray.length){
        box.innerHTML = "<span>No photos selected</span>";
        return;
    }

    photoArray.forEach(src => {
        const wrapper = document.createElement("div");
        wrapper.style.width = "100%";

        const img = document.createElement("img");
        img.src = src;
        img.alt = "Uploaded Photo";
        img.style.width = "100%";
        img.style.display = "block";

        wrapper.appendChild(img);
        box.appendChild(wrapper);
    });
}

function saveData(){
    const rows = [...tableBody.rows].map(row => ({
        material: row.cells[1].querySelector("input").value,
        qty: row.cells[2].querySelector("select").value
    }));

    const data = {
        customer: document.getElementById("customer").value,
        date: document.getElementById("date").value,
        mcType: document.getElementById("mcType").value,
        mcNo: document.getElementById("mcNo").value,
        listType: document.getElementById("listType").value,
        rows: rows
    };

    localStorage.setItem(storageKey, JSON.stringify(data));
}

function loadData(){
    const saved = localStorage.getItem(storageKey);
    const savedPhoto = localStorage.getItem(photoKey);

    if(savedPhoto){
        try{
            showPhotos(JSON.parse(savedPhoto));
        }catch(error){
            showPhotos([]);
        }
    }

    if(!saved) return false;

    try{
        const data = JSON.parse(saved);

        document.getElementById("customer").value = data.customer || "";
        document.getElementById("date").value = data.date || "";
        document.getElementById("mcType").value = data.mcType || "";
        document.getElementById("mcNo").value = data.mcNo || "";
        document.getElementById("listType").value = data.listType || "ACE";

        materialList = document.getElementById("listType").value === "AMS" ? amsMaterialList : aceMaterialList;
        updateMaterialSuggestions();

        tableBody.innerHTML = "";
        if(data.rows && data.rows.length){
            data.rows.forEach(item => addRow(item.material || "", item.qty || ""));
        }else{
            addRow();
        }
        return true;
    }catch(error){
        localStorage.removeItem(storageKey);
        return false;
    }
}

function clearRows(){
    if(confirm("Clear all material rows, photo and saved data?")){
        localStorage.removeItem(storageKey);
        localStorage.removeItem(photoKey);

        tableBody.innerHTML = "";
        document.getElementById("customer").value = "";
        document.getElementById("mcType").value = "";
        document.getElementById("mcNo").value = "";
        document.getElementById("listType").value = "ACE";
        document.getElementById("date").valueAsDate = new Date();
        document.getElementById("photoUpload").value = "";

        materialList = aceMaterialList;
        updateMaterialSuggestions();
        showPhotos([]);
        addRow();
        saveData();
    }
}

function safeName(text, fallback){
    return (text.trim() || fallback)
        .replace(/[^a-zA-Z0-9_-]/g, "_")
        .replace(/_+/g, "_")
        .replace(/^_|_$/g, "");
}

async function downloadPDF(){
    saveData();
    document.body.classList.add("pdf-mode");

    const { jsPDF } = window.jspdf;
    const element = document.querySelector(".app");

    const images = document.querySelectorAll("#photoPreviewBox img");

    await Promise.all([...images].map(img => {
        if(img.complete) return Promise.resolve();

        return new Promise(resolve => {
            img.onload = resolve;
            img.onerror = resolve;
        });
    }));

    await new Promise(resolve => setTimeout(resolve, 800));

    const canvas = await html2canvas(element, {
        scale: 1.5,
        useCORS: true,
        allowTaint: true,
        backgroundColor: "#ffffff",
        scrollY: -window.scrollY
    });

    const imgData = canvas.toDataURL("image/jpeg", 0.85);
    const pdf = new jsPDF("p", "mm", "a4");
    const pdfWidth = pdf.internal.pageSize.getWidth();
    const pageHeight = pdf.internal.pageSize.getHeight();
    const pdfHeight = (canvas.height * pdfWidth) / canvas.width;

    let heightLeft = pdfHeight;
    let position = 0;

    pdf.addImage(imgData, "JPEG", 0, position, pdfWidth, pdfHeight, undefined, 'FAST');
    heightLeft -= pageHeight;

    while(heightLeft > 0){
        position = heightLeft - pdfHeight;
        pdf.addPage();
        pdf.addImage(imgData, "JPEG", 0, position, pdfWidth, pdfHeight, undefined, 'FAST');
        heightLeft -= pageHeight;
    }

    const customer = safeName(document.getElementById("customer").value, "Customer");
    const machineModel = safeName(document.getElementById("mcType").value, "Machine_Model");
    const serialNumber = safeName(document.getElementById("mcNo").value, "Serial_No");

    pdf.save(`${customer}_${machineModel}_${serialNumber}.pdf`);
    setTimeout(() => {
        document.body.classList.remove("pdf-mode");
    }, 500);
}

document.querySelectorAll("#customer,#date,#mcType,#mcNo,#listType").forEach(input => {
    input.addEventListener("input", saveData);
    input.addEventListener("change", saveData);
});

window.addEventListener("DOMContentLoaded", () => {
    updateMaterialSuggestions();
    if(!loadData()){
        document.getElementById("date").valueAsDate = new Date();
        addRow();
    }
});
</script></body>
</html>
